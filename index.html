<div class="total" id="result">合計:0円</div>
<script>

function calc(){

let total=0

let s=300
let l=600
let t=450

let rate=[1700,1600,1500,1500,1500,1500,1400]

for(let i=1;i<=7;i++){

let h=document.getElementById("h"+i).value||0
let ss=document.getElementById("s"+i).value||0
let ll=document.getElementById("l"+i).value||0
let tt=document.getElementById("t"+i).value||0
let d=document.getElementById("d"+i).value||0

let pay=h*rate[i-1]+ss*s+ll*l+tt*t

pay=pay*0.85

pay=Math.floor(pay/100)*100

pay=pay-d

total+=pay

}

document.getElementById("result").innerHTML="合計:"+total+"円"

}

</script>
